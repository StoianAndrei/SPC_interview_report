name: CI

on:
  push:
  workflow_dispatch:

jobs:
  python-verification:
    name: Python verification (rules, JSON schema, ADF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install pandas jsonschema
      - name: Regenerate sample data
        run: python3 gatekeeper/data-raw/generate_gatekeeper_data.py
      - name: Prove validation rules catch all planted anomalies
        run: python3 gatekeeper/data-raw/verify_rules.py
      - name: Validate TUFMAN 2 LL JSON schema (sample passes, dirty fails)
        run: |
          python3 - <<'PY'
          import json, sys
          from jsonschema import Draft7Validator
          schema = json.load(open("gatekeeper/data/schemas/tufman2_ll_master.schema.json"))
          Draft7Validator.check_schema(schema)
          v = Draft7Validator(schema)
          clean = list(v.iter_errors(json.load(open("gatekeeper/data/samples/tufman2_ll_sample.json"))))
          dirty = list(v.iter_errors(json.load(open("gatekeeper/data/samples/tufman2_ll_dirty.json"))))
          assert not clean, f"clean sample should pass, got {len(clean)} errors"
          assert dirty, "dirty sample should fail"
          print(f"OK: clean passes, dirty fails with {len(dirty)} errors")
          PY
      - name: Run ADF orchestrator end-to-end tests
        run: python3 adf/test_adf.py

  r-engine-smoke:
    name: R engine smoke test (executes the validation engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R engine dependencies
        run: |
          Rscript -e 'install.packages(c("dplyr","tidyr","readr","stringr","purrr","jsonlite"))'
      - name: Run R smoke test (validates all sample categories)
        run: Rscript gatekeeper/tests/smoke.R

  r-app-smoke:
    name: Shiny server smoke test (headless testServer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install engine + UI dependencies
        run: |
          Rscript -e 'install.packages(c("dplyr","tidyr","readr","stringr","purrr","jsonlite","shiny","DT","leaflet","plotly"))'
      - name: Run Shiny server smoke test (headless)
        run: Rscript gatekeeper/tests/app_smoke.R
